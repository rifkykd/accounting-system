spring:
  application:
    name: accounting-system
  data:
    mongodb:
      uri: mongodb://localhost:27017/accounting_erp
  jpa:
    hibernate:
      ddl-auto: update
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: your-secret-key-change-this-in-production
  expiration: 86400000

logging:
  level:
    root: INFO
    com.erp: DEBUG